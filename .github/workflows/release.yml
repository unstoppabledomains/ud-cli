name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  build-x64:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install ldid for macOS ad-hoc signing
        run: |
          curl -fsSL -o /usr/local/bin/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_x86_64
          chmod +x /usr/local/bin/ldid

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Bundle and build x64 binaries
        run: |
          npm run bundle
          sed -i '1{/^#!/d}' dist/ud-cli.cjs
          npx pkg dist/ud-cli.cjs --targets node22-macos-x64,node22-linux-x64,node22-win-x64 --no-bytecode --public --out-path bin/
          node scripts/rename-binaries.mjs --arch x64

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-x64
          path: bin/ud-*
          if-no-files-found: error

  build-arm64:
    needs: ci
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install ldid for macOS ad-hoc signing
        run: |
          curl -fsSL -o /usr/local/bin/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_aarch64
          chmod +x /usr/local/bin/ldid

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Bundle and build arm64 binaries
        run: |
          npm run bundle
          sed -i '1{/^#!/d}' dist/ud-cli.cjs
          npx pkg dist/ud-cli.cjs --targets node22-macos-arm64,node22-linux-arm64 --no-bytecode --public --out-path bin/
          node scripts/rename-binaries.mjs --arch arm64

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-arm64
          path: bin/ud-*
          if-no-files-found: error

  publish-github-release:
    needs: [build-x64, build-arm64]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download x64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-x64
          path: bin/

      - name: Download arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-arm64
          path: bin/

      - name: Generate checksums
        run: cd bin && sha256sum ud-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: |
            bin/ud-*
            bin/checksums.txt

  publish-npm:
    needs: publish-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
