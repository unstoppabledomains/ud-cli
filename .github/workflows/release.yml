name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  build-linux:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Bundle and build Linux/Windows binaries
        run: |
          npm run bundle
          npx pkg dist/ud-cli.cjs --targets node22-linux-x64,node22-linux-arm64,node22-win-x64 --out-path bin/
          node scripts/rename-binaries.mjs

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-linux
          path: bin/ud-*
          if-no-files-found: error

  build-macos:
    needs: ci
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Bundle and build macOS binaries
        run: |
          npm run bundle
          npx pkg dist/ud-cli.cjs --targets node22-macos-arm64,node22-macos-x64 --out-path bin/
          node scripts/rename-binaries.mjs

      - name: Ad-hoc sign macOS binaries
        run: |
          for f in bin/ud-macos-*; do
            codesign --sign - --force "$f"
            codesign --verify "$f"
            echo "Signed: $f"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-macos
          path: bin/ud-*
          if-no-files-found: error

  publish-github-release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux/Windows binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-linux
          path: bin/

      - name: Download macOS binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries-macos
          path: bin/

      - name: Generate checksums
        run: cd bin && sha256sum ud-* > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          files: |
            bin/ud-*
            bin/checksums.txt

  publish-npm:
    needs: publish-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
